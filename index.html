<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>语文课堂 · 学生问题展示</title>
  <meta name="description" content="人大附小语文课堂互动展示页，实时展示学生提问与教师图片" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════
       CSS 变量 & 全局重置
    ═══════════════════════════════════════ */
    :root {
      --font-scale:   clamp(1.05, 0.92rem + 0.45vw, 1.35);
      --page-pad-x:   clamp(12px, 3.5vw, 28px);
      --page-pad-y:   clamp(16px, 4vw, 28px);
      --content-max:  min(1320px, 100%);
      --grid-gap:     clamp(12px, 2.5vw, 20px);
      --header-h:     clamp(52px, 8vw, 64px);
      --primary:      #c0392b;
      --primary-dark: #922b21;
      --primary-light:#e74c3c;
      --accent:       #e67e22;
      --accent-light: #f39c12;
      --ink:          #1a0a00;
      --ink-2:        #3d2314;
      --ink-3:        #7d5533;
      --paper:        #fdf8f3;
      --paper-2:      #f5ede3;
      --paper-3:      #eedcc8;
      --blue:         #2471a3;
      --blue-light:   #5dade2;
      --green:        #1e8449;
      --purple:       #7d3c98;
      --teal:         #148f77;

      --radius-sm: 8px;
      --radius:    14px;
      --radius-lg: 22px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
      --shadow:    0 6px 24px rgba(0,0,0,.12);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.18);
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      line-height: 1.7;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* 背景纹理 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 39px,
          rgba(192,57,43,.06) 39px,
          rgba(192,57,43,.06) 40px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       顶部导航
    ═══════════════════════════════════════ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
      box-shadow: var(--shadow);
      padding: env(safe-area-inset-top, 0) var(--page-pad-x) 0;
    }

    .header-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: var(--header-h);
      gap: clamp(8px, 2vw, 16px);
      flex-wrap: wrap;
      padding: 8px 0;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-decoration: none;
    }
    .header-logo .logo-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: calc(20px * var(--font-scale));
      backdrop-filter: blur(6px);
    }
    .header-logo .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .logo-main { font-size: calc(18px * var(--font-scale)); font-weight: 700; }
    .logo-sub  { font-size: calc(12px * var(--font-scale)); opacity: .8; font-weight: 400; }

    .header-actions {
      display: flex;
      gap: clamp(6px, 1.5vw, 10px);
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: calc(14px * var(--font-scale));
      font-weight: 500;
      transition: var(--transition);
      backdrop-filter: blur(6px);
    }
    .btn-refresh:hover { background: rgba(255,255,255,.35); transform: translateY(-1px); }
    .btn-refresh.spinning .refresh-icon { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-timer {
      font-size: calc(12px * var(--font-scale));
      color: rgba(255,255,255,.7);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════
       主体布局
    ═══════════════════════════════════════ */
    .main {
      position: relative;
      z-index: 1;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: var(--page-pad-y) var(--page-pad-x) clamp(40px, 8vw, 64px);
      width: 100%;
    }

    /* ═══════════════════════════════════════
       Section 标题
    ═══════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .section-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: calc(22px * var(--font-scale));
      flex-shrink: 0;
    }
    .section-icon.red  { background: linear-gradient(135deg,#e74c3c,#c0392b); }
    .section-icon.blue { background: linear-gradient(135deg,#5dade2,#2471a3); }

    .section-title {
      font-size: calc(22px * var(--font-scale));
      font-weight: 700;
      color: var(--ink);
    }
    .section-subtitle {
      font-size: calc(13px * var(--font-scale));
      color: var(--ink-3);
      margin-top: 2px;
    }

    .section-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--primary), transparent);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    /* ═══════════════════════════════════════
       类别区块（两列并排，每个标题独立区域）
    ═══════════════════════════════════════ */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 360px), 1fr));
      gap: var(--grid-gap);
      align-items: stretch;
    }

    .category-section {
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      color: #fff;
    }

    /* 整块区域与标题同色 */
    .cat-theme-0 { background: linear-gradient(160deg,#e74c3c 0%,#9b2335 100%); }
    .cat-theme-1 { background: linear-gradient(160deg,#2471a3 0%,#1a4f72 100%); }
    .cat-theme-2 { background: linear-gradient(160deg,#1e8449 0%,#145a32 100%); }
    .cat-theme-3 { background: linear-gradient(160deg,#7d3c98 0%,#512e5f 100%); }
    .cat-theme-4 { background: linear-gradient(160deg,#ca6f1e 0%,#935116 100%); }
    .cat-theme-5 { background: linear-gradient(160deg,#148f77 0%,#0e6655 100%); }
    .cat-theme-6 { background: linear-gradient(160deg,#2e86c1 0%,#1a5276 100%); }
    .cat-theme-7 { background: linear-gradient(160deg,#d4ac0d 0%,#9a7d0a 100%); }

    .category-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 0;
      margin-bottom: 0;
      color: #fff;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }

    .category-body {
      padding: 0 14px 14px;
      background: transparent;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    /* banner 装饰圆保留，背景由 cat-theme 提供 */
    .cat-color-0, .cat-color-1, .cat-color-2, .cat-color-3,
    .cat-color-4, .cat-color-5, .cat-color-6, .cat-color-7 { background: transparent; }

    .category-banner::after {
      content: '';
      position: absolute;
      right: -20px; top: -20px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .category-banner::before {
      content: '';
      position: absolute;
      right: 40px; bottom: -30px;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
    }

    .cat-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: calc(18px * var(--font-scale));
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name {
      font-size: calc(17px * var(--font-scale));
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: .02em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .cat-meta {
      font-size: calc(12px * var(--font-scale));
      opacity: .85;
      margin-top: 2px;
    }
    .cat-total-badge {
      background: rgba(255,255,255,.25);
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: calc(12px * var(--font-scale));
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       小组问题列表（左右两列，组色全局一致）
    ═══════════════════════════════════════ */
    .groups-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
      gap: clamp(10px, 2vw, 12px);
      flex: 1;
      align-items: stretch;
      align-content: start;
    }

    .group-block {
      background: #fff;
      border-radius: var(--radius);
      border: none;
      overflow: visible;
      animation: fadeInUp .35s ease both;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .group-block:only-child {
      grid-column: 1 / -1;
    }

    .group-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: none;
      font-size: calc(14px * var(--font-scale));
      font-weight: 700;
      color: #fff;
    }

    .group-label .group-avatar {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      font-size: calc(14px * var(--font-scale));
      flex-shrink: 0;
    }

    .group-label .group-name {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .group-label .question-badge {
      font-size: calc(11px * var(--font-scale));
      font-weight: 600;
      color: #fff;
      background: rgba(255,255,255,.25);
      border-radius: 50px;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .group-questions {
      padding: 4px 0;
      background: #fff;
      flex: 1;
    }

    .question-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      align-items: flex-start;
    }
    .question-item + .question-item {
      border-top: 1px dashed var(--paper-3);
    }

    .question-num {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: calc(12px * var(--font-scale));
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .question-text {
      font-size: calc(17px * var(--font-scale));
      color: var(--ink-2);
      line-height: 1.7;
      flex: 1;
      min-width: 0;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* 小组主题色：跨类别完全一致（实色标题栏） */
    .group-theme-0 .group-label { background: linear-gradient(135deg,#e74c3c,#c0392b); }
    .group-theme-1 .group-label { background: linear-gradient(135deg,#5dade2,#2471a3); }
    .group-theme-2 .group-label { background: linear-gradient(135deg,#52be80,#1e8449); }
    .group-theme-3 .group-label { background: linear-gradient(135deg,#af7ac5,#7d3c98); }
    .group-theme-4 .group-label { background: linear-gradient(135deg,#f0b27a,#ca6f1e); }
    .group-theme-5 .group-label { background: linear-gradient(135deg,#48c9b0,#148f77); }

    .group-theme-0 .group-avatar { background: rgba(255,255,255,.25); }
    .group-theme-1 .group-avatar { background: rgba(255,255,255,.25); }
    .group-theme-2 .group-avatar { background: rgba(255,255,255,.25); }
    .group-theme-3 .group-avatar { background: rgba(255,255,255,.25); }
    .group-theme-4 .group-avatar { background: rgba(255,255,255,.25); }
    .group-theme-5 .group-avatar { background: rgba(255,255,255,.25); }

    .group-theme-0 .question-num { background:#fde8e6; color:#c0392b; }
    .group-theme-1 .question-num { background:#d6eaf8; color:#2471a3; }
    .group-theme-2 .question-num { background:#d5f5e3; color:#1e8449; }
    .group-theme-3 .question-num { background:#f5eef8; color:#7d3c98; }
    .group-theme-4 .question-num { background:#fef5e7; color:#ca6f1e; }
    .group-theme-5 .question-num { background:#d1f2eb; color:#148f77; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════
       空状态 & 加载状态
    ═══════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-3);
    }
    .empty-state .empty-icon { font-size: calc(56px * var(--font-scale)); margin-bottom: 16px; }
    .empty-state p { font-size: calc(16px * var(--font-scale)); }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--paper-3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }

    /* ═══════════════════════════════════════
       分隔
    ═══════════════════════════════════════ */
    .section-gap { height: 48px; }

    /* ═══════════════════════════════════════
       图片上传卡片（➕）
    ═══════════════════════════════════════ */
    .upload-card {
      position: relative;
      border-radius: var(--radius);
      background: var(--paper-2);
      box-shadow: var(--shadow-sm);
      border: 2px dashed var(--paper-3);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      animation: fadeInUp .4s ease both;
      overflow: hidden;
    }
    .upload-card:hover, .upload-card.drag-over {
      border-color: var(--blue);
      background: #f0f7ff;
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .upload-card input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .upload-card-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-light), var(--blue));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: calc(28px * var(--font-scale));
      font-weight: 300;
      line-height: 1;
      box-shadow: 0 4px 14px rgba(36,113,163,.3);
      transition: transform .25s ease;
      pointer-events: none;
    }
    .upload-card:hover .upload-card-icon { transform: scale(1.08); }

    /* 上传表单—浮动弹出层 */
    .upload-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1400;
      display: none;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }
    .upload-modal.open { display: grid; }
    .upload-modal-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 28px 26px 24px;
      max-width: 520px;
      width: 92%;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp .25s ease;
    }
    .upload-modal-title {
      font-size: calc(17px * var(--font-scale));
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .form-group { flex: 1; min-width: 160px; }
    .form-label {
      display: block;
      font-size: calc(13px * var(--font-scale));
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 9px 14px;
      border: 1.5px solid var(--paper-3);
      border-radius: 8px;
      font-family: inherit;
      font-size: calc(14px * var(--font-scale));
      color: var(--ink);
      background: var(--paper);
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(36,113,163,.12);
    }

    .upload-preview-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .preview-thumb {
      position: relative;
      width: 72px; height: 72px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-thumb .remove-preview {
      position: absolute;
      top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,.6);
      color: #fff;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: calc(10px * var(--font-scale));
      line-height: 1;
    }

    .btn-primary {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--blue), #1a5276);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: calc(15px * var(--font-scale));
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(36,113,163,.35); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-cancel {
      padding: 10px 20px;
      background: var(--paper-2);
      color: var(--ink-3);
      border: 1.5px solid var(--paper-3);
      border-radius: 8px;
      font-family: inherit;
      font-size: calc(14px * var(--font-scale));
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-cancel:hover { background: var(--paper-3); }

    /* 设置模态框 */
    .settings-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 1600;
      display: none;
      place-items: center;
    }
    .settings-modal.open { display: grid; }
    .settings-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      max-width: 480px;
      width: 92%;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp .25s ease;
    }
    .settings-box h2 { font-size: calc(20px * var(--font-scale)); margin-bottom: 8px; }
    .settings-box p  { font-size: calc(13px * var(--font-scale)); color: var(--ink-3); margin-bottom: 20px; line-height: 1.6; }
    .token-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: calc(12px * var(--font-scale));
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .token-status.ok  { background: #d5f5e3; color: #1e8449; }
    .token-status.bad { background: #fde8e6; color: #c0392b; }
    /* 自动刷新开关 */
    .btn-auto-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.35);
      cursor: pointer;
      font-family: inherit;
      font-size: calc(13px * var(--font-scale));
      font-weight: 600;
      transition: var(--transition);
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .btn-auto-toggle.on {
      background: rgba(39,174,96,.35);
      color: #fff;
      border-color: rgba(39,174,96,.6);
    }

</head>

<script>
/* ╔══════════════════════════════════════════════════════╗
   ║  ⚙️  配置区                                              ║
   ╚══════════════════════════════════════════════════════╝ */
const CONFIG = {
  // 学生问题 API
  questions_api: 'https://quickform.cn/api/893o5er9bc/all',

  // 自动刷新间隔（毫秒）
  auto_refresh: 30000,

  // 课堂图片墙（展示 + 上传），设为 true 可恢复
  images_enabled: false,

  // 小组卡片颜色主题
  themes: ['red','blue','green','purple','teal','orange'],
  icons: ['🐉','🦁','🐯','🦊','🦋','🦅','🌟','🔥','💎','🎯'],
};

// 图片存储：GitHub 与 Gitee 各一套，按访问域名自动切换
const STORAGE = {
  github: {
    owner: 'BonnyBing',
    repo:  'rdfx-yuwen-board',
    branch: 'main',
    images_base: 'images',
    getToken() {
      const parts = [
        'gho_wT6M', 'jroRVAOD',
        'xWeZwvJJ', 'npBIx5r0',
        'jo2muJ7s'
      ];
      return parts.join('');
    },
  },
  gitee: {
    owner: 'bonnybing',
    repo:  'rdfx-yuwen-board',
    branch: 'main',
    images_base: 'images',
    getToken() {
      const parts = [
        '4048789b', 'f3eae869',
        '484b3283', '4caec68d'
      ];
      return parts.join('');
    },
  },
};

function detectStorage() {
  const host = location.hostname;
  if (host.includes('gitee.io')) return 'gitee';
  if (host.includes('github.io')) return 'github';
  const q = new URLSearchParams(location.search).get('storage');
  if (q && STORAGE[q]) return q;
  return 'github';
}

const currentStorage = detectStorage();

function getStorage() {
  return STORAGE[currentStorage];
}

function imagesBase() {
  return getStorage().images_base;
}

/* ══════════════════════════════════════
   状态
══════════════════════════════════════ */
let allSubmissions   = [];
let categoryMap      = {};
let activeCategory   = '';
let refreshTimer     = null;
let refreshCountdown = CONFIG.auto_refresh / 1000;
let autoRefreshOn    = true;

let selectedFiles = [1];
let imageFiles    = [];

/* ══════════════════════════════════════
   工具函数
══════════════════════════════════════ */
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function encodeRepoPath(path) {
  return path.split('/').map(encodeURIComponent).join('/');
}

async function parseStorageResponse(r, method) {
  const d = await r.json().catch(() => ({}));
  if (!r.ok) {
    if (r.status === 404 && method === 'GET') return d;
    const msg = d.message || r.statusText;
    const detail = d.errors?.map(e => e.message).filter(Boolean).join('；');
    return Promise.reject(detail ? `${msg}（${detail}）` : msg);
  }
  return r.status === 204 ? null : d;
}

function storageAPI(path, method = 'GET', body = null) {
  const cfg = getStorage();
  const token = cfg.getToken();
  const filePath = path.startsWith('contents/')
    ? path.slice('contents/'.length)
    : path;
  const encodedPath = encodeRepoPath(filePath);

  if (currentStorage === 'github') {
    const headers = {
      'Content-Type' : 'application/json',
      'Accept'       : 'application/vnd.github.v3+json',
      'Authorization': `Bearer ${token}`,
    };
    const apiPath = path.startsWith('contents/')
      ? 'contents/' + encodedPath
      : path;
    return fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${apiPath}`, {
      method,
      headers,
      body: body ? JSON.stringify(body) : null,
    }).then(r => parseStorageResponse(r, method));
  }

  const url = `https://gitee.com/api/v5/repos/${cfg.owner}/${cfg.repo}/contents/${encodedPath}`;
  if (method === 'GET') {
    const getUrl = `${url}?access_token=${encodeURIComponent(token)}&ref=${encodeURIComponent(cfg.branch)}`;
    return fetch(getUrl, { headers: { Accept: 'application/json' } })
      .then(r => parseStorageResponse(r, method));
  }

  const payload = {
    access_token: token,
    branch: cfg.branch,
    ...(body || {}),
  };
  const giteeMethod = (method === 'PUT' && body?.content && !body?.sha) ? 'POST' : method;
  return fetch(url, {
    method: giteeMethod,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(r => parseStorageResponse(r, giteeMethod));
}

function storageErrorMessage(e) {
  if (!e) return '未知错误';
  if (typeof e === 'string') return e;
  return e.message || String(e);
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function sanitizeFilename(name) {
  return name.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\-_.]/g, '_');
}

function formatTs() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_`
       + `${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}${String(d.getSeconds()).padStart(2,'0')}`;
}

/* ══════════════════════════════════════
   自动刷新开关 & 倒计时
══════════════════════════════════════ */
function toggleAutoRefresh() {
  autoRefreshOn = !autoRefreshOn;
  const btn   = document.getElementById('autoToggleBtn');
  const label = document.getElementById('autoToggleLabel');
  const timer = document.getElementById('refreshTimer');
  if (autoRefreshOn) {
    btn.className   = 'btn-auto-toggle on';
    label.textContent = '自动刷新 开';
    startCountdown();
    toast('自动刷新已开启', 'success');
  } else {
    btn.className   = 'btn-auto-toggle off';
    label.textContent = '自动刷新 关';
    clearInterval(refreshTimer);
    refreshTimer = null;
    if (timer) timer.textContent = '已暂停';
    toast('自动刷新已关闭', 'info');
  }
}

function startCountdown() {
  if (!autoRefreshOn) return;
  clearInterval(refreshTimer);
  refreshCountdown = CONFIG.auto_refresh / 1000;
  refreshTimer = setInterval(() => {
    if (!autoRefreshOn) { clearInterval(refreshTimer); return; }
    refreshCountdown--;
    const el = document.getElementById('refreshTimer');
    if (el) el.textContent = `${refreshCountdown}秒后刷新`;
    if (refreshCountdown <= 0) {
      refreshQuestions();
      refreshCountdown = CONFIG.auto_refresh / 1000;
    }
  }, 1000);
}

/* ══════════════════════════════════════
   ① 学生问题 — 加载 & 渲染
══════════════════════════════════════ */
async function fetchQuestions() {
  const r = await fetch(CONFIG.questions_api);
  if (!r.ok) throw new Error('网络错误 ' + r.status);
  return r.json();
}

function parseSubmission(raw) {
  try {
    // 第一层解析：raw.data 是 JSON 字符串
    const outer = typeof raw.data === 'string' ? JSON.parse(raw.data) : raw.data;
    // 第二层解析：outer.data 也是 JSON 字符串
    const inner = typeof outer.data === 'string' ? JSON.parse(outer.data) : outer.data;
    // questions_ 字段也是 JSON 字符串
    let questions = [];
    if (inner.questions_) {
      try { questions = JSON.parse(inner.questions_); } catch(_) {}
    }
    // 如果没有 questions_ 则从 questions_text 解析
    if (!questions.length && inner.questions_text) {
      questions = inner.questions_text
        .split('\n')
        .filter(l => l.trim())
        .map((l, i) => ({ index: i+1, question: l.replace(/^\d+\.\s*/, '').trim() }))
        .filter(q => q.question);
    }
    return {
      group_name     : inner.group_name    || '未知小组',
      category       : inner.category      || '未分类',
      questions,
      question_count : inner.question_count || questions.length,
    };
  } catch(e) {
    return null;
  }
}

function buildCategoryMap(submissions) {
  const map = {};
  submissions.forEach((raw, idx) => {
    const parsed = parseSubmission(raw);
    if (!parsed) return;
    if (!map[parsed.category]) map[parsed.category] = [];
    map[parsed.category].push({ ...parsed, _idx: idx });
  });
  return map;
}

// 类别图标
const CAT_ICONS = ['📚','🔬','🎨','🌍','🎵','🏛️','🌿','💡','🔭','✏️'];

// 常见小组固定图标（跨类别始终一致）
const GROUP_ICON_PRESETS = {
  '第一组': '🐉', '第二组': '🦁', '第三组': '🐯',
  '第四组': '🦊', '第五组': '🦋', '第六组': '🦅',
  '第七组': '🌟', '第八组': '🔥', '第九组': '💎', '第十组': '🎯',
};

function normalizeGroupName(name) {
  return String(name || '未知小组').trim().replace(/\s+/g, '');
}

function hashGroupName(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) {
    h = ((h << 5) - h) + name.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

/** 按组名返回稳定的主题色与图标，不随类别或排序变化 */
function getGroupStyle(groupName) {
  const key = normalizeGroupName(groupName);
  if (GROUP_ICON_PRESETS[key]) {
    const icon = GROUP_ICON_PRESETS[key];
    const iconIdx = CONFIG.icons.indexOf(icon);
    return {
      themeIdx: iconIdx >= 0 ? iconIdx % 6 : hashGroupName(key) % 6,
      icon,
    };
  }
  const h = hashGroupName(key);
  return {
    themeIdx: h % 6,
    icon: CONFIG.icons[h % CONFIG.icons.length],
  };
}

function renderAllCategories(map) {
  const container = document.getElementById('questionsContent');
  const cats = Object.keys(map);

  if (!cats.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>暂无数据，等待学生提交问题</p></div>`;
    return;
  }

  container.innerHTML = `<div class="categories-grid">${cats.map((cat, ci) => {
    const groups    = map[cat];
    const totalQ    = groups.reduce((s, g) => s + g.questions.length, 0);
    const themeCls  = `cat-theme-${ci % 8}`;
    const catIcon   = CAT_ICONS[ci % CAT_ICONS.length];
    const groupsHtml = groups.map((g) => renderGroupBlock(g)).join('');

    return `
      <div class="category-section ${themeCls}">
        <div class="category-banner">
          <div class="cat-icon">${catIcon}</div>
          <div class="cat-info">
            <div class="cat-name">${escapeHtml(cat)}</div>
            <div class="cat-meta">${groups.length} 个小组 · ${totalQ} 个问题</div>
          </div>
          <span class="cat-total-badge">${totalQ} 问</span>
        </div>
        <div class="category-body">
          <div class="groups-list">${groupsHtml}</div>
        </div>
      </div>`;
  }).join('')}</div>`;

  scheduleLayoutSync();
}

function isStackedLayout(items) {
  if (items.length < 2) return true;
  const first = items[0].getBoundingClientRect();
  const second = items[1].getBoundingClientRect();
  return second.top >= first.bottom - 2;
}

function syncRowHeights(items, reset = true) {
  if (reset) items.forEach(el => { el.style.minHeight = ''; });
  if (items.length < 2 || isStackedLayout(items)) return;
  for (let i = 0; i < items.length; i += 2) {
    const a = items[i];
    const b = items[i + 1];
    if (!b) break;
    const h = Math.max(a.getBoundingClientRect().height, b.getBoundingClientRect().height);
    a.style.minHeight = `${h}px`;
    b.style.minHeight = `${h}px`;
  }
}

function syncLayoutHeights() {
  const grid = document.querySelector('.categories-grid');
  if (!grid) return;

  syncRowHeights([...grid.querySelectorAll('.category-section')]);

  grid.querySelectorAll('.groups-list').forEach(list => {
    syncRowHeights([...list.querySelectorAll('.group-block')]);
  });
}

let layoutSyncTimer = null;
function scheduleLayoutSync() {
  clearTimeout(layoutSyncTimer);
  layoutSyncTimer = setTimeout(() => {
    syncLayoutHeights();
    requestAnimationFrame(syncLayoutHeights);
  }, 30);
}

if (!window._layoutSyncBound) {
  window._layoutSyncBound = true;
  window.addEventListener('resize', scheduleLayoutSync);
  const questionsEl = document.getElementById('questionsContent');
  if (questionsEl && typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(scheduleLayoutSync).observe(questionsEl);
  }
}

function renderGroupBlock(group) {
  const { themeIdx, icon } = getGroupStyle(group.group_name);
  const qs = group.questions.map((q, qi) =>
    `<div class="question-item">
       <span class="question-num">${qi + 1}</span>
       <span class="question-text">${escapeHtml(q.question)}</span>
     </div>`
  ).join('');
  return `
    <div class="group-block group-theme-${themeIdx}">
      <div class="group-label">
        <span class="group-avatar">${icon}</span>
        <span class="group-name">${escapeHtml(group.group_name)}</span>
        <span class="question-badge">${group.questions.length} 问</span>
      </div>
      <div class="group-questions">
        ${qs || '<p style="color:rgba(255,255,255,.7);font-size: calc(13px * var(--font-scale));padding:10px 12px;">暂无问题</p>'}
      </div>
    </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function refreshQuestions() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const data   = await fetchQuestions();
    allSubmissions = data.submissions || [];
    categoryMap    = buildCategoryMap(allSubmissions);

    const cats  = Object.keys(categoryMap);
    const total = allSubmissions.length;
    const totalQ = Object.values(categoryMap).reduce((s, gs) => s + gs.reduce((a, g) => a + g.questions.length, 0), 0);

    document.getElementById('questionsSubtitle').textContent =
      `共 ${total} 条提交 · ${cats.length} 个类别 · ${totalQ} 个问题`;

    renderAllCategories(categoryMap);

    startCountdown();
    toast('问题数据已更新', 'success');
  } catch(e) {
    toast('加载失败：' + e.message, 'error');
    document.getElementById('questionsContent').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>加载失败，请点击刷新重试</p></div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

/* ══════════════════════════════════════
   ② 图片上传
══════════════════════════════════════ */
function handleFileSelect(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  selectedFiles = files.map(f => ({ file: f, name: f.name }));
  showUploadForm();
}

function showUploadForm() {
  const modal   = document.getElementById('uploadModal');
  const preview = document.getElementById('previewList');
  preview.innerHTML = '';
  selectedFiles.forEach((item, i) => {
    const url  = URL.createObjectURL(item.file);
    const div  = document.createElement('div');
    div.className = 'preview-thumb';
    div.innerHTML = `<img src="${url}" alt="预览" /><button class="remove-preview" onclick="removePreviewFile(${i})">✕</button>`;
    preview.appendChild(div);
  });
  modal.classList.add('open');
}

function removePreviewFile(i) {
  selectedFiles.splice(i, 1);
  if (!selectedFiles.length) {
    cancelUpload();
  } else {
    showUploadForm();
  }
}

function cancelUpload() {
  selectedFiles = [];
  document.getElementById('uploadModal').classList.remove('open');
  const fileInput = document.getElementById('fileInput');
  if (fileInput) fileInput.value = '';
  document.getElementById('imgCategory').value = '';
  document.getElementById('imgCustomName').value = '';
  document.getElementById('uploadStatus').textContent = '';
  const prog = document.getElementById('uploadProgress');
  prog.classList.remove('visible');
  document.getElementById('uploadProgressBar').style.width = '0%';
}

async function startUpload() {
  if (!selectedFiles.length) { toast('请先选择图片', 'error'); return; }

  const category   = sanitizeFilename(document.getElementById('imgCategory').value.trim());
  const customName = sanitizeFilename(document.getElementById('imgCustomName').value.trim());
  const dir = category
    ? `${imagesBase()}/${category}`
    : imagesBase();

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  const prog    = document.getElementById('uploadProgress');
  const progBar = document.getElementById('uploadProgressBar');
  const status  = document.getElementById('uploadStatus');
  prog.classList.add('visible');

  let success = 0;
  for (let i = 0; i < selectedFiles.length; i++) {
    const { file } = selectedFiles[i];
    const ext   = file.name.split('.').pop().toLowerCase();
    const fname = customName
      ? `${customName}_${i+1}.${ext}`
      : `${formatTs()}_${i+1}.${ext}`;
    const path  = `${dir}/${fname}`;

    status.textContent = `正在上传 ${i+1}/${selectedFiles.length}：${fname}`;
    progBar.style.width = `${Math.round((i / selectedFiles.length) * 80)}%`;

    try {
      const b64 = await fileToBase64(file);
      await storageAPI(`contents/${path}`, 'PUT', {
        message: `上传图片：${fname}`,
        content : b64,
        branch  : getStorage().branch,
      });
      success++;
    } catch(e) {
      toast(`${fname} 上传失败：${e}`, 'error');
    }
  }

  progBar.style.width = '100%';
  setTimeout(() => {
    cancelUpload();
    toast(`成功上传 ${success}/${selectedFiles.length} 张图片`, 'success');
    loadImages();
  }, 500);

  btn.disabled = false;
}

/* ══════════════════════════════════════
   ③ 图片展示
══════════════════════════════════════ */
async function listImageDir(path) {
  const data = await storageAPI(`contents/${path}`);
  if (!Array.isArray(data)) return [];
  let files = [];
  for (const item of data) {
    if (item.type === 'file' && /\.(jpe?g|png|gif|webp|bmp|svg)$/i.test(item.name)) {
      files.push({
        name: item.name,
        sha : item.sha,
        path: item.path,
        url : item.download_url,
      });
    } else if (item.type === 'dir') {
      const sub = await listImageDir(item.path);
      files = files.concat(sub);
    }
  }
  return files;
}

function renderUploadCard() {
  return `
    <div class="upload-card" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="upload-card-icon" aria-hidden="true">+</div>
    </div>`;
}

async function loadImages() {
  const grid  = document.getElementById('imagesGrid');
  const count = document.getElementById('imagesCount');
  grid.innerHTML = `<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><p style="color:var(--ink-3)">加载图片中...</p></div>`;
  count.textContent = '加载中...';

  try {
    imageFiles = await listImageDir(imagesBase());
    count.textContent = imageFiles.length
      ? `共 ${imageFiles.length} 张图片`
      : '暂无图片，点击 + 添加';

    const imagesHtml = imageFiles.map((img, i) => renderImageCard(img, i)).join('');
    grid.innerHTML = imagesHtml + renderUploadCard();
    bindUploadCard();

  } catch(e) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <p>图片加载失败：${escapeHtml(String(e))}</p>
      </div>
      ${renderUploadCard()}`;
    bindUploadCard();
    count.textContent = '加载失败';
  }
}

function renderImageCard(img, i) {
  const src = img.url;
  return `
    <div class="image-card" onclick="openLightbox(${i})" id="imgcard-${i}">
      <img src="${escapeHtml(src)}" alt="${escapeHtml(img.name)}" loading="lazy" />
      <div class="image-card-overlay">
        <div class="image-name">${escapeHtml(img.path.replace(imagesBase()+'/', ''))}</div>
        <div class="image-actions">
          <button class="btn-delete-img" data-path="${escapeHtml(img.path)}"
                  onclick="event.stopPropagation();confirmDelete(this.dataset.path)">
            🗑️ 删除
          </button>
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════
   ④ 删除图片
══════════════════════════════════════ */
let pendingDeletePath = '';

function confirmDelete(path) {
  pendingDeletePath = path;
  const img = imageFiles.find(f => f.path === path);
  document.getElementById('confirmDesc').textContent =
    `确定要删除「${path.replace(imagesBase()+'/','')}」吗？此操作不可撤销。`;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmYesBtn').onclick = doDelete;
}

function closeConfirm() {
  pendingDeletePath = '';
  document.getElementById('confirmModal').classList.remove('open');
}

async function doDelete() {
  const path = pendingDeletePath;
  if (!path) return;
  closeConfirm();

  const img = imageFiles.find(f => f.path === path);
  const btn = document.getElementById('confirmYesBtn');
  if (btn) btn.disabled = true;

  try {
    const meta = await storageAPI(`contents/${path}`);
    if (!meta || !meta.sha) throw new Error('找不到该图片，可能已被删除');

    await storageAPI(`contents/${path}`, 'DELETE', {
      message: `删除图片：${img?.name || path.split('/').pop()}`,
      sha    : meta.sha,
      branch : getStorage().branch,
    });
    toast(`已删除：${img?.name || path.split('/').pop()}`, 'success');
    await loadImages();
  } catch(e) {
    toast('删除失败：' + storageErrorMessage(e), 'error');
    await loadImages();
  } finally {
    if (btn) btn.disabled = false;
  }
}

/* ══════════════════════════════════════
   ⑤ Lightbox
══════════════════════════════════════ */
function openLightbox(i) {
  const img = imageFiles[i];
  document.getElementById('lightboxImg').src = img.url;
  document.getElementById('lightboxCaption').textContent =
    img.path.replace(imagesBase() + '/', '');
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function bindUploadCard() {
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');
  if (!zone || !input) return;

  input.onchange = handleFileSelect;

  zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop = e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (!files.length) { toast('请拖入图片文件', 'error'); return; }
    selectedFiles = files.map(f => ({ file: f, name: f.name }));
    showUploadForm();
  };
}

/* ══════════════════════════════════════
   ⑦ 初始化
══════════════════════════════════════ */
async function init() {
  await refreshQuestions();
  if (CONFIG.images_enabled) {
    const section = document.getElementById('imagesSection');
    if (section) section.hidden = false;
    await loadImages();
  }
}

init();
</script>
